<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TonerTrack Pro</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22TonerTrack%20Pro%22%2C%22short_name%22%3A%22Toners%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b1219%22%2C%22theme_color%22%3A%22%23f68523%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%2523f68523'%2F%3E%3Ctext%20x%3D'50'%20y%3D'70'%20font-size%3D'60'%20text-anchor%3D'middle'%20fill%3D'white'%3E%F0%9F%92%A7%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="theme-color" content="#f68523">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #0b1219; --surface: #121e29; --surface2: #1a2835; --border: #253341;
            --text: #e4e8ec; --text2: #9ba5b0; --accent: #f68523; --accent2: #e0741a;
            --green: #2ecc71; --green2: #27ae60; --blue: #2d9cdb; --orange: #f39c12;
            --radius: 14px; --shadow: 0 12px 40px rgba(0,0,0,0.5);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 0.25s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height:100vh; overflow-x:hidden; -webkit-tap-highlight-color: transparent; }
        .header { background: rgba(18,30,41,0.8); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; position:sticky; top:0; z-index:100; flex-wrap:wrap; }
        .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.5rem; letter-spacing:-0.6px; color:#fff; }
        .logo svg { width:32px; height:32px; fill:var(--accent); }
        .header-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn { padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.9rem; font-family:var(--font); transition:all var(--transition); white-space:nowrap; display:inline-flex; align-items:center; gap:8px; background:transparent; color:var(--text); border:1px solid var(--border); backdrop-filter:blur(8px); }
        .btn-primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
        .btn-primary:hover,.btn-primary:active { background:var(--accent2); transform:translateY(-1px); box-shadow:0 8px 25px rgba(246,133,35,0.35); }
        .btn-outline { border-color:var(--border); color:var(--text); }
        .btn-outline:hover,.btn-outline:active { background:var(--surface2); border-color:#4a5568; }
        .btn-sm { padding:7px 14px; font-size:0.8rem; border-radius:8px; }
        .btn-danger { background:#c0392b; color:#fff; border-color:#c0392b; }
        .btn-danger:hover { background:#a93226; }
        .btn-green { background:var(--green); color:#000; border-color:var(--green); font-weight:700; }
        .btn-green:hover { background:var(--green2); }
        .container { max-width:1300px; margin:0 auto; padding:24px 24px 120px; position:relative; z-index:1; }
        .stat-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(155px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card { background: rgba(18,30,41,0.7); backdrop-filter:blur(12px); border-radius:var(--radius); padding:22px; border:1px solid var(--border); box-shadow:var(--shadow); cursor:pointer; transition:all var(--transition); }
        .stat-card:active { transform:scale(0.97); background:var(--surface2); }
        .stat-card .label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.8px; color:var(--text2); margin-bottom:8px; }
        .stat-card .value { font-size:2rem; font-weight:700; }
        .line-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .line-tab { background:var(--surface2); border:1px solid var(--border); padding:10px 18px; border-radius:30px; font-weight:600; font-size:0.82rem; cursor:pointer; transition:all var(--transition); color:var(--text2); user-select:none; }
        .line-tab.active { background:var(--accent); color:#000; border-color:var(--accent); box-shadow:0 4px 12px rgba(246,133,35,0.25); }
        .panel { display:none; }
        .panel.active { display:block; }
        .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); box-shadow:var(--shadow); backdrop-filter:blur(8px); }
        table { width:100%; border-collapse:collapse; font-size:0.9rem; min-width:850px; }
        th,td { padding:14px 16px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
        th { background:var(--surface2); font-weight:700; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.6px; color:var(--text2); position:sticky; top:0; }
        tr:hover td { background:rgba(255,255,255,0.02); }
        .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.73rem; font-weight:700; }
        .badge-in { background:rgba(46,204,113,0.2); color:var(--green); }
        .badge-out { background:rgba(231,76,60,0.2); color:#e74c3c; }
        .badge-low { background:rgba(243,156,18,0.2); color:var(--orange); animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .editable-stock, .editable-min { cursor:pointer; transition:background 0.2s; }
        .editable-stock:hover, .editable-min:hover { background: rgba(246,133,35,0.1); border-radius:4px; padding:2px 4px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; font-size:0.82rem; margin-bottom:6px; color:var(--text2); }
        .form-group input,.form-group select { width:100%; padding:12px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.95rem; font-family:var(--font); -webkit-appearance:none; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        @media (max-width:480px) { .form-row { grid-template-columns:1fr; } }
        .empty-state { text-align:center; padding:50px; color:var(--text2); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal { background:var(--surface); border-radius:var(--radius); padding:28px; max-width:600px; width:100%; border:1px solid var(--border); box-shadow:0 25px 70px rgba(0,0,0,0.7); max-height:85vh; overflow-y:auto; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:var(--surface2); border:1px solid var(--border); padding:14px 20px; border-radius:8px; font-weight:600; font-size:0.85rem; box-shadow:0 10px 30px rgba(0,0,0,0.5); animation:slideIn 0.3s ease, fadeOut 0.4s ease 2.4s forwards; max-width:350px; backdrop-filter:blur(8px); }
        .toast.success { border-left:4px solid var(--green); }
        .toast.error { border-left:4px solid #e74c3c; }
        @keyframes slideIn { from{transform:translateX(120%);opacity:0;} to{transform:translateX(0);opacity:1;} }
        @keyframes fadeOut { to{opacity:0;transform:translateY(-10px);} }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L4 12h3v8h10v-8h3L12 2zm-1 8h2v6h-2v-6zm0 8h2v2h-2v-2z"/></svg><span>Toner<span style="color:var(--accent);">Track</span></span></div>
        <div class="header-actions" id="headerActions">
            <button class="btn btn-primary" id="btnReceive" onclick="openReceiveModal()">📥 Receive</button>
            <button class="btn btn-outline" id="btnOutgoing" onclick="openOutgoingModal()">📤 Outgoing</button>
            <button class="btn btn-sm btn-outline" onclick="exportCSV()">📊 CSV</button>
            <button class="btn btn-sm btn-outline" onclick="exportData()">💾 Backup</button>
            <button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()">📂 Restore</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn btn-sm btn-outline" onclick="openSettingsModal()">⚙️ Settings</button>
        </div>
    </header>
    <div class="container">
        <div class="stat-row" id="statRow"></div>
        <div class="line-tabs" id="lineTabs"></div>
        <div class="search-bar" style="display:flex;gap:8px;margin-bottom:16px;">
            <input type="text" id="searchInventory" placeholder="🔍 Search..." oninput="renderInventory()" style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text);">
            <button class="btn btn-sm btn-outline" onclick="document.getElementById('searchInventory').value='';renderInventory();">Clear</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th>Line</th><th>Toner Code</th><th>Color</th><th>Stock</th><th>Min</th><th>Avg Cost</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead><tbody id="inventoryBody"></tbody></table><div class="empty-state" id="inventoryEmpty" style="display:none;">📭 No toners found.</div></div>
    </div>

    <div class="modal-overlay" id="receiveModal" style="display:none;"><div class="modal"><h3>📥 Receive Toner</h3><form onsubmit="handleReceive(event)"><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="recDate" required></div><div class="form-group"><label>Toner Code *</label><input type="text" id="recCode" required></div></div><div class="form-row"><div class="form-group"><label>Paint Line *</label><select id="recLine" required></select></div><div class="form-group"><label>Color / Name</label><input type="text" id="recColor"></div></div><div class="form-row"><div class="form-group"><label>Quantity *</label><input type="number" id="recQty" value="1" min="1"></div><div class="form-group"><label>Unit Cost ($)</label><input type="number" id="recCost" step="0.01" min="0" placeholder="e.g. 12.50"></div></div><div class="form-row"><div class="form-group"><label>Supplier</label><input type="text" id="recSupplier"></div><div class="form-group"><label>Min Level</label><input type="number" id="recMin" value="3" min="0"></div></div><div class="form-group"><label>Notes</label><input type="text" id="recNotes"></div><div style="display:flex;gap:10px;justify-content:flex-end;"><button type="button" class="btn btn-outline" onclick="closeReceiveModal()">Done</button><button type="submit" class="btn btn-green">✅ Confirm</button></div></form></div></div>
    <div class="modal-overlay" id="outgoingModal" style="display:none;"><div class="modal"><h3>📤 Toner Outgoing</h3><form onsubmit="handleOutgoing(event)"><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="outDate" required></div><div class="form-group"><label>Toner Code *</label><input type="text" id="outCode" required list="tonerSuggest"></div></div><div class="form-row"><div class="form-group"><label>Paint Line (auto)</label><input type="text" id="outLineDisplay" readonly style="background:#0b1219;"></div><div class="form-group"><label>Quantity *</label><input type="number" id="outQty" value="1" min="1"></div></div><div class="form-row"><div class="form-group"><label>Customer</label><input type="text" id="outCustomer"></div><div class="form-group"><label>Notes</label><input type="text" id="outNotes"></div></div><div id="outWarning" style="color:var(--orange);font-size:0.82rem;margin-bottom:10px;display:none;"></div><div style="display:flex;gap:10px;justify-content:flex-end;"><button type="button" class="btn btn-outline" onclick="closeOutgoingModal()">Done</button><button type="submit" class="btn btn-primary">✅ Confirm</button></div></form></div></div>
    <div class="modal-overlay" id="settingsModal" style="display:none;"><div class="modal"><h3>⚙️ Settings</h3><h4>Paint Lines</h4><div id="lineSettingsFields"></div><button class="btn btn-sm btn-outline" id="addLineBtn" style="margin-top:8px;">+ Add Line</button><h4 style="margin-top:24px;">Suppliers</h4><div id="supplierList"></div><button class="btn btn-sm btn-outline" id="addSupplierBtn" style="margin-top:8px;">+ Add Supplier</button><div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;"><button class="btn btn-outline" onclick="closeSettingsModal()">Cancel</button><button class="btn btn-green" onclick="saveAllSettings()">💾 Save All</button></div></div></div>
    <div class="toast-container" id="toastContainer"></div>
    <datalist id="tonerSuggest"></datalist>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzMfCPalgaZx7chEghiI_-kpIzvLq61BU",
            authDomain: "toner-track-pro-v2.firebaseapp.com",
            projectId: "toner-track-pro-v2",
            storageBucket: "toner-track-pro-v2.firebasestorage.app",
            messagingSenderId: "96521492059",
            appId: "1:96521492059:web:c40e09b3a53294246a117e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const DEFAULT_LINES = ['Line 1', 'Line 2', 'Line 3'];
        let inventory = {};
        let lines = [...DEFAULT_LINES];
        let suppliers = [];
        let currentLineFilter = '__ALL__';

        db.collection('inventory').onSnapshot(snapshot => {
            const newInv = {};
            snapshot.forEach(doc => { newInv[doc.id] = doc.data(); });
            inventory = newInv;
            renderAll();
        });
        db.collection('settings').doc('config').onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                if (data.lines) lines = data.lines;
                if (data.suppliers) suppliers = data.suppliers;
            } else {
                db.collection('settings').doc('config').set({ lines: DEFAULT_LINES, suppliers: [] });
                lines = [...DEFAULT_LINES]; suppliers = [];
            }
            renderAll();
        });

        function renderAll() {
            renderLineTabs();
            renderInventory();
            updateStats();
            updateTonerSuggest();
        }

        function renderLineTabs() {
            const container = document.getElementById('lineTabs');
            if (!container) return;
            container.innerHTML = '';
            const allBtn = document.createElement('span');
            allBtn.className = 'line-tab' + (currentLineFilter === '__ALL__' ? ' active' : '');
            allBtn.textContent = 'All'; allBtn.style.cursor = 'pointer';
            allBtn.onclick = function() { currentLineFilter = '__ALL__'; renderLineTabs(); renderInventory(); };
            container.appendChild(allBtn);
            lines.forEach(function(line) {
                const btn = document.createElement('span');
                btn.className = 'line-tab' + (currentLineFilter === line ? ' active' : '');
                btn.textContent = line; btn.style.cursor = 'pointer';
                btn.onclick = function() { currentLineFilter = line; renderLineTabs(); renderInventory(); };
                container.appendChild(btn);
            });
        }

        function renderInventory() {
            const search = (document.getElementById('searchInventory')?.value||'').toLowerCase();
            let filtered = Object.values(inventory).filter(t => (currentLineFilter==='__ALL__'||t.line===currentLineFilter));
            if (search) filtered = filtered.filter(t => t.code.toLowerCase().includes(search)||(t.color||'').toLowerCase().includes(search));
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            document.getElementById('inventoryEmpty').style.display = filtered.length?'none':'block';
            filtered.forEach(t => {
                const isLow = t.stock < t.minLevel;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.line||'?'}</td><td><strong>${t.code}</strong></td><td>${t.color}</td><td style="font-weight:700;">${t.stock}</td><td>${t.minLevel}</td><td>$${(t.cost||0).toFixed(2)}</td><td>${isLow?'<span class="badge badge-low">⚠ Low</span>':'<span class="badge badge-in">OK</span>'}</td><td>${t.lastUpdated||''}</td><td><button class="btn btn-sm btn-outline" onclick="quickOutgoing('${t.code}')">📤</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function updateStats() {
            const filtered = currentLineFilter==='__ALL__'?Object.values(inventory):Object.values(inventory).filter(t=>t.line===currentLineFilter);
            const unique = filtered.length;
            const total = filtered.reduce((s,t)=>s+t.stock,0);
            const low = filtered.filter(t=>t.stock<t.minLevel).length;
            const totalValue = filtered.reduce((s,t)=>s+(t.stock*(t.cost||0)),0);
            document.getElementById('statRow').innerHTML = `
                <div class="stat-card"><div class="label">📦 Unique</div><div class="value blue">${unique}</div></div>
                <div class="stat-card"><div class="label">📋 Total Units</div><div class="value green">${total}</div></div>
                <div class="stat-card"><div class="label">💰 Total Value</div><div class="value" style="color:#2d9cdb;">$${totalValue.toFixed(0)}</div></div>
                <div class="stat-card"><div class="label">⚠️ Low Stock</div><div class="value red">${low}</div></div>`;
        }

        function updateTonerSuggest() {
            const datalist = document.getElementById('tonerSuggest');
            datalist.innerHTML = '';
            Object.values(inventory).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.code;
                datalist.appendChild(opt);
            });
        }

        const todayISO = () => new Date().toISOString().slice(0,10);
        const showToast = (msg, type='success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = msg;
            container.appendChild(toast); setTimeout(() => toast.remove(), 2700);
        };

        window.quickOutgoing = (code) => { document.getElementById('outgoingModal').style.display='flex'; document.getElementById('outCode').value=code; };

        window.openReceiveModal = () => { document.getElementById('receiveModal').style.display='flex'; document.getElementById('recDate').value=todayISO(); populateLineSelect('recLine'); };
        window.closeReceiveModal = () => document.getElementById('receiveModal').style.display='none';
        window.openOutgoingModal = () => { document.getElementById('outgoingModal').style.display='flex'; document.getElementById('outDate').value=todayISO(); };
        window.closeOutgoingModal = () => document.getElementById('outgoingModal').style.display='none';
        window.openSettingsModal = () => {
            document.getElementById('settingsModal').style.display='flex';
            const lineContainer = document.getElementById('lineSettingsFields'); lineContainer.innerHTML = '';
            lines.forEach(line => { const div = document.createElement('div'); div.style.marginBottom='8px'; div.innerHTML = `<input type="text" value="${line}" style="width:100%;padding:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);">`; lineContainer.appendChild(div); });
            document.getElementById('addLineBtn').onclick = () => { const div = document.createElement('div'); div.style.marginBottom='8px'; div.innerHTML = '<input type="text" placeholder="New line name" style="width:100%;padding:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);">'; lineContainer.appendChild(div); };
            const supplierContainer = document.getElementById('supplierList'); supplierContainer.innerHTML = '';
            suppliers.forEach(s => { const div = document.createElement('div'); div.style.display='flex'; div.style.gap='8px'; div.style.marginBottom='8px'; div.innerHTML = `<input type="text" value="${s.name||''}" placeholder="Name" style="flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);"><input type="email" value="${s.email||''}" placeholder="Email" style="flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">🗑</button>`; supplierContainer.appendChild(div); });
            document.getElementById('addSupplierBtn').onclick = () => { const div = document.createElement('div'); div.style.display='flex'; div.style.gap='8px'; div.style.marginBottom='8px'; div.innerHTML = '<input type="text" placeholder="Supplier name" style="flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);"><input type="email" placeholder="Email" style="flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);"><button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">🗑</button>'; supplierContainer.appendChild(div); };
        };
        window.closeSettingsModal = () => document.getElementById('settingsModal').style.display='none';
        window.saveAllSettings = async () => {
            const lineInputs = document.querySelectorAll('#lineSettingsFields input');
            const newLines = []; lineInputs.forEach(inp => { const v = inp.value.trim(); if(v) newLines.push(v); });
            if (newLines.length===0) { showToast('At least one line required.','error'); return; }
            const supplierDivs = document.querySelectorAll('#supplierList > div');
            const newSuppliers = []; supplierDivs.forEach(div => { const inputs = div.querySelectorAll('input'); const name = inputs[0].value.trim(); const email = inputs[1].value.trim(); if(name) newSuppliers.push({name,email}); });
            await db.collection('settings').doc('config').update({ lines: newLines, suppliers: newSuppliers });
            closeSettingsModal(); showToast('Settings saved!','success');
        };

        function populateLineSelect(selId, selected='') {
            const sel = document.getElementById(selId); if(!sel) return;
            sel.innerHTML = '';
            lines.forEach(l => { const opt = document.createElement('option'); opt.value=l; opt.textContent=l; if(l===selected) opt.selected=true; sel.appendChild(opt); });
        }

        window.handleReceive = async (e) => {
            e.preventDefault();
            const line = document.getElementById('recLine').value;
            const code = document.getElementById('recCode').value.trim().toUpperCase();
            if (!line || !code) { showToast('Code and line required.','error'); return; }
            const qty = parseInt(document.getElementById('recQty').value)||0;
            const cost = parseFloat(document.getElementById('recCost').value)||0;
            const supplier = document.getElementById('recSupplier').value.trim();
            const notes = document.getElementById('recNotes').value.trim();
            const min = parseInt(document.getElementById('recMin').value)||3;
            const date = document.getElementById('recDate').value;
            const tonerRef = db.collection('inventory').doc(code);
            const doc = await tonerRef.get();
            if (!doc.exists) {
                await tonerRef.set({ code, color: document.getElementById('recColor').value.trim()||'N/A', stock: qty, minLevel: min, lastUpdated: date, line, supplier, cost, totalSpent: cost*qty });
            } else {
                const existing = doc.data();
                const newStock = (existing.stock||0) + qty;
                const newTotalSpent = (existing.totalSpent||0) + (cost*qty);
                await tonerRef.update({ stock: newStock, color: document.getElementById('recColor').value.trim()||existing.color, minLevel: min>=0?min:existing.minLevel, line, supplier: supplier||existing.supplier||'', cost: newStock>0?newTotalSpent/newStock:0, totalSpent: newTotalSpent, lastUpdated: date });
            }
            showToast(`✅ ${code} received.`,'success');
            document.getElementById('recCode').value=''; document.getElementById('recQty').value='1'; document.getElementById('recCost').value='';
            document.getElementById('recCode').focus();
        };

        window.handleOutgoing = async (e) => {
            e.preventDefault();
            const code = document.getElementById('outCode').value.trim().toUpperCase();
            const qty = parseInt(document.getElementById('outQty').value)||0;
            const tonerRef = db.collection('inventory').doc(code);
            const doc = await tonerRef.get();
            if (!doc.exists) { showToast('Toner not found.','error'); return; }
            const toner = doc.data();
            if (toner.stock < qty) { showToast(`Only ${toner.stock} available.`,'error'); return; }
            await tonerRef.update({ stock: toner.stock - qty, lastUpdated: document.getElementById('outDate').value });
            showToast(`📤 ${code} shipped.`,'success');
            document.getElementById('outCode').value=''; document.getElementById('outQty').value='1';
            document.getElementById('outCode').focus();
        };

        window.exportCSV = () => {
            const inv = Object.values(inventory);
            const headers = ['Line','Code','Color','Stock','Min','Cost'];
            const rows = inv.map(t => [t.line||'', t.code, t.color, t.stock, t.minLevel, (t.cost||0).toFixed(2)]);
            const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
            const blob = new Blob([csv],{type:'text/csv'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`inventory_${todayISO()}.csv`; a.click();
        };

        window.exportData = () => {
            const data = { inventory, lines, suppliers, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`backup_${todayISO()}.json`; a.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.inventory) {
                        const batch = db.batch();
                        const invDocs = await db.collection('inventory').get();
                        invDocs.forEach(doc => batch.delete(doc.ref));
                        Object.entries(data.inventory).forEach(([code,val]) => batch.set(db.collection('inventory').doc(code),val));
                        await batch.commit();
                        if (data.lines && data.suppliers) {
                            await db.collection('settings').doc('config').set({ lines: data.lines, suppliers: data.suppliers });
                        }
                        showToast('📂 Restored!','success');
                    }
                } catch { showToast('Error reading file.','error'); }
            };
            reader.readAsText(file); event.target.value='';
        };

        ['receiveModal','outgoingModal','settingsModal'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', function(e) { if (e.target === el) el.style.display='none'; });
        });

        document.getElementById('recDate').value = todayISO();
        document.getElementById('outDate').value = todayISO();
        renderAll();
    </script>
</body>
</html>
