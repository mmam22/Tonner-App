<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TONERTRACK PRO</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22TONERTRACK%20PRO%22%2C%22short_name%22%3A%22Toners%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230b1219%22%2C%22theme_color%22%3A%22%23f68523%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'45'%20fill%3D'%2523f68523'%2F%3E%3Ctext%20x%3D'50'%20y%3D'70'%20font-size%3D'60'%20text-anchor%3D'middle'%20fill%3D'white'%3ETT%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="theme-color" content="#f68523">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #0b1219; --surface: #121e29; --surface2: #1a2835; --border: #253341;
            --text: #e4e8ec; --text2: #9ba5b0; --accent: #f68523; --accent2: #e0741a;
            --green: #2ecc71; --blue: #2d9cdb; --orange: #f39c12;
            --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height:100vh; -webkit-tap-highlight-color: transparent; }
        .header { background: rgba(18,30,41,0.9); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; position:sticky; top:0; z-index:100; flex-wrap:wrap; }
        .logo { font-weight:800; font-size:1.4rem; letter-spacing:1px; color:#fff; }
        .logo span { color:var(--accent); }
        .header-actions { display:flex; gap:6px; flex-wrap:wrap; }
        .btn { padding:9px 16px; border-radius:8px; border:1px solid var(--border); cursor:pointer; font-weight:700; font-size:0.8rem; font-family:var(--font); transition:all 0.2s; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; background:transparent; color:var(--text); text-transform:uppercase; letter-spacing:0.5px; }
        .btn-primary { background:var(--accent); color:#000; border-color:var(--accent); }
        .btn-primary:hover,.btn-primary:active { background:var(--accent2); }
        .btn-outline { border-color:var(--border); color:var(--text); }
        .btn-outline:hover,.btn-outline:active { background:var(--surface2); }
        .btn-sm { padding:6px 10px; font-size:0.7rem; border-radius:6px; }
        .btn-green { background:var(--green); color:#000; border-color:var(--green); }
        .btn-danger { background:#e74c3c; color:#fff; border-color:#e74c3c; }
        .container { max-width:1300px; margin:0 auto; padding:20px 20px 100px; }
        .stat-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
        .stat-card { background:var(--surface); border-radius:var(--radius); padding:18px; border:1px solid var(--border); box-shadow:var(--shadow); cursor:pointer; transition:all 0.2s; }
        .stat-card:active { transform:scale(0.97); }
        .stat-card .label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:6px; font-weight:700; }
        .stat-card .value { font-size:1.8rem; font-weight:800; }
        .chart-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
        .chart-container { flex:1; min-width:280px; background:var(--surface); border-radius:var(--radius); padding:16px; border:1px solid var(--border); }
        .chart-container h4 { font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:12px; font-weight:700; }
        canvas { display:block; width:100%; height:auto; max-height:180px; }
        .paint-line-mini-cards { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
        .mini-card { background:var(--surface); border-radius:var(--radius); padding:12px 16px; border:1px solid var(--border); cursor:pointer; transition:all 0.2s; min-width:110px; }
        .mini-card:hover { border-color:var(--accent); }
        .mini-card .line-name { font-weight:700; font-size:0.8rem; color:var(--accent); margin-bottom:4px; text-transform:uppercase; }
        .mini-card .line-stats { font-size:0.75rem; color:var(--text2); }
        .tabs { display:flex; gap:4px; margin-bottom:14px; background:var(--surface); border-radius:var(--radius); padding:4px; border:1px solid var(--border); overflow-x:auto; }
        .tab { flex:1; min-width:70px; text-align:center; padding:10px 12px; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.8rem; transition:all 0.2s; white-space:nowrap; color:var(--text2); background:transparent; border:none; text-transform:uppercase; letter-spacing:0.5px; }
        .tab.active { background:var(--accent); color:#000; }
        .line-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
        .line-tab { background:var(--surface2); border:1px solid var(--border); padding:8px 14px; border-radius:24px; font-weight:700; font-size:0.75rem; cursor:pointer; transition:all 0.2s; color:var(--text2); user-select:none; text-transform:uppercase; }
        .line-tab.active { background:var(--accent); color:#000; border-color:var(--accent); }
        .sortable-ghost { opacity:0.4; background:var(--accent); }
        .panel { display:none; }
        .panel.active { display:block; }
        .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; min-width:1100px; }
        th,td { padding:10px 10px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
        th { background:var(--surface2); font-weight:700; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.8px; color:var(--text2); position:sticky; top:0; }
        tr:hover td { background:rgba(255,255,255,0.02); }
        .drag-handle { cursor:grab; color:var(--text2); font-weight:700; user-select:none; }
        .drag-handle:active { cursor:grabbing; }
        .cell-editable { cursor:pointer; transition:background 0.2s; padding:4px 6px; border-radius:4px; }
        .cell-editable:hover { background:rgba(246,133,35,0.1); }
        .cell-editable input { width:100%; padding:4px 6px; border-radius:4px; border:1px solid var(--accent); background:var(--surface2); color:var(--text); font-size:0.85rem; font-family:var(--font); font-weight:700; }
        .badge-low { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; background:rgba(243,156,18,0.2); color:var(--orange); animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .quick-add-row td { padding:6px 8px; }
        .quick-add-row input, .quick-add-row select { width:100%; padding:6px 8px; border-radius:4px; border:1px dashed var(--accent); background:transparent; color:var(--text); font-size:0.8rem; font-family:var(--font); }
        .quick-add-row input::placeholder { color:var(--text2); text-transform:uppercase; font-weight:600; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-weight:700; font-size:0.75rem; margin-bottom:5px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input,.form-group select { width:100%; padding:10px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.9rem; font-family:var(--font); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        @media (max-width:480px) { .form-row { grid-template-columns:1fr; } }
        .empty-state { text-align:center; padding:40px; color:var(--text2); font-weight:700; text-transform:uppercase; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
        .modal { background:var(--surface); border-radius:var(--radius); padding:24px; max-width:550px; width:100%; border:1px solid var(--border); box-shadow:0 20px 60px rgba(0,0,0,0.7); max-height:85vh; overflow-y:auto; }
        .toast-container { position:fixed; top:16px; right:16px; z-index:999; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
        .toast { background:var(--surface2); border:1px solid var(--border); padding:12px 18px; border-radius:8px; font-weight:700; font-size:0.8rem; box-shadow:0 8px 24px rgba(0,0,0,0.5); animation:slideIn 0.3s ease, fadeOut 0.4s ease 2.2s forwards; max-width:320px; }
        .toast.success { border-left:4px solid var(--green); }
        .toast.error { border-left:4px solid #e74c3c; }
        @keyframes slideIn { from{transform:translateX(120%);opacity:0;} to{transform:translateX(0);opacity:1;} }
        @keyframes fadeOut { to{opacity:0;transform:translateY(-8px);} }
        .notification-popup { position:fixed; bottom:24px; right:24px; background:var(--surface); border:2px solid var(--accent); border-radius:var(--radius); padding:18px 22px; z-index:300; box-shadow:0 16px 48px rgba(0,0,0,0.8); max-width:360px; animation:slideUp 0.3s ease; }
        @keyframes slideUp { from{transform:translateY(80px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        .notification-popup h4 { color:var(--accent); margin-bottom:8px; font-size:0.9rem; text-transform:uppercase; }
        .notification-popup p { margin-bottom:12px; font-size:0.8rem; }
        .suggestion-card { background:var(--surface); border-left:4px solid var(--blue); border-radius:var(--radius); padding:12px 16px; margin-bottom:8px; font-size:0.8rem; font-weight:600; }
        .alert-banner { background:var(--accent); color:#000; padding:10px 16px; border-radius:var(--radius); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:0.8rem; text-transform:uppercase; }
        .alert-banner button { background:none; border:none; color:#000; font-size:1.2rem; cursor:pointer; font-weight:700; }
        .scanner-container { position:relative; width:100%; max-width:400px; margin:0 auto; border-radius:10px; overflow:hidden; background:#000; }
        #scannerVideo { width:100%; height:auto; display:block; }
        .scan-region-highlight { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:180px; height:70px; border:2px dashed var(--accent); border-radius:10px; pointer-events:none; }
        .alias-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
        .alias-row input { flex:1; padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:0.85rem; font-family:var(--font); text-transform:uppercase; }
        .order-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
        .order-card .progress-bar { height:6px; background:var(--surface2); border-radius:3px; margin-top:10px; overflow:hidden; }
        .order-card .progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.5s; }
        .history-edit-row td { padding:4px; background:var(--surface2); }
        .history-edit-row input { width:100%; padding:4px; border-radius:4px; border:1px solid var(--accent); background:var(--bg); color:var(--text); font-weight:700; }
    </style>
</head>
<body>
<div id="notificationContainer"></div>
<header class="header">
    <div class="logo">TONER<span>TRACK</span> PRO</div>
    <div class="header-actions" id="headerActions">
        <button class="btn btn-sm btn-outline" id="btnFastScan" onclick="toggleFastScan()">FAST SCAN</button>
        <button class="btn btn-primary" id="btnReceive" onclick="openReceiveModal()">RECEIVE</button>
        <button class="btn btn-outline" id="btnOutgoing" onclick="openOutgoingModal()">OUTGOING</button>
        <button class="btn btn-sm btn-outline" onclick="openAliasModal()">ALIASES</button>
        <button class="btn btn-sm btn-outline" onclick="exportCSV()">CSV</button>
        <button class="btn btn-sm btn-outline" onclick="printReport()">REPORT</button>
        <button class="btn btn-sm btn-outline" onclick="exportData()">BACKUP</button>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()">RESTORE</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-sm btn-outline" onclick="openSettingsModal()">SETTINGS</button>
    </div>
</header>
<div class="container">
    <div class="stat-row" id="statRow"></div>
    <div class="paint-line-mini-cards" id="miniCardsRow"></div>
    <div class="chart-row"><div class="chart-container"><h4>STOCK BY PAINT LINE</h4><canvas id="barChart" height="180"></canvas></div><div class="chart-container"><h4>SPENDING LAST 4 WEEKS</h4><canvas id="spendingChart" height="180"></canvas></div></div>
    <div id="suggestionsWidget" style="margin-bottom:16px;"></div>
    <div class="tabs" id="mainTabs">
        <button class="tab active" data-tab="inventory">INVENTORY</button>
        <button class="tab" data-tab="orders">ORDERS</button>
        <button class="tab" data-tab="history">HISTORY</button>
        <button class="tab" data-tab="lowstock">LOW STOCK</button>
    </div>
    <div class="panel active" id="panel-inventory">
        <div id="lowStockBanner" class="alert-banner" style="display:none;"><span>LOW STOCK ALERT</span><button onclick="this.parentElement.style.display='none'">X</button></div>
        <div class="line-tabs" id="lineTabs"></div>
        <div style="display:flex;gap:8px;margin-bottom:14px;"><input type="text" id="searchInventory" placeholder="SEARCH..." oninput="renderInventory()" style="flex:1; padding:10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-weight:600; text-transform:uppercase;"><button class="btn btn-sm btn-outline" onclick="document.getElementById('searchInventory').value='';renderInventory();">CLEAR</button></div>
        <div class="table-wrap"><table><thead><tr><th></th><th>LINE</th><th>SCAN CODE</th><th>TONER NUMBER</th><th>SUPPLIER</th><th>STOCK</th><th>MIN</th><th>AVG COST</th><th>STATUS</th><th>UPDATED</th><th>OUT</th></tr></thead><tbody id="inventoryBody"></tbody><tfoot id="quickAddRow"></tfoot></table><div class="empty-state" id="inventoryEmpty" style="display:none;">NO TONERS FOUND</div></div>
    </div>
    <div class="panel" id="panel-orders"><button class="btn btn-primary" onclick="openCreateOrderModal()">NEW ORDER</button><button class="btn btn-sm btn-outline" onclick="reorderLowStock()" style="margin-left:8px;">REORDER LOW</button><select id="orderFilter" onchange="renderOrders()" style="padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);margin-left:8px;font-weight:700;"><option value="pending">PENDING</option><option value="partial">PARTIAL</option><option value="complete">COMPLETE</option><option value="all">ALL</option></select><div id="ordersList" style="margin-top:14px;"></div></div>
    <div class="panel" id="panel-history"><div style="display:flex;gap:8px;margin-bottom:14px;"><input type="text" id="searchHistory" placeholder="SEARCH..." oninput="renderHistory()" style="flex:1; padding:10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-weight:600; text-transform:uppercase;"><select id="filterType" onchange="renderHistory()" style="padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-weight:700;"><option value="all">ALL</option><option value="in">IN</option><option value="out">OUT</option></select></div><div class="table-wrap"><table><thead><tr><th>DATE</th><th>TYPE</th><th>LINE</th><th>TONER NUMBER</th><th>QTY</th><th>COST/UNIT</th><th>CUSTOMER/SUPPLIER</th><th>ACTIONS</th></tr></thead><tbody id="historyBody"></tbody></table></div></div>
    <div class="panel" id="panel-lowstock"><div class="table-wrap"><table><thead><tr><th>LINE</th><th>TONER NUMBER</th><th>COLOR</th><th>STOCK</th><th>MIN</th><th>AVG COST</th><th>DEFICIT</th></tr></thead><tbody id="lowStockBody"></tbody></table></div></div>
</div>
<!-- Modals remain unchanged except where edited inline in script -->
<div class="modal-overlay" id="receiveModal" style="display:none;"><div class="modal"><h3>RECEIVE TONER</h3><form onsubmit="handleReceive(event)"><!-- same fields --></form></div></div>
<div class="modal-overlay" id="outgoingModal" style="display:none;"><div class="modal"><h3>OUTGOING TONER</h3><form onsubmit="handleOutgoing(event)"><!-- same fields --></form></div></div>
<!-- ... keep all other modals identical but ensure IDs match ... -->
<!-- The script modifications are in the <script> block -->

<script>
    // Polyfill for Canvas roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
            this.beginPath();
            this.moveTo(x + r.tl, y);
            this.lineTo(x + w - r.tr, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
            this.lineTo(x + w, y + h - r.br);
            this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
            this.lineTo(x + r.bl, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
            this.lineTo(x, y + r.tl);
            this.quadraticCurveTo(x, y, x + r.tl, y);
            this.closePath();
        };
    }

    // Resume AudioContext on first user interaction for iOS
    let audioCtx = null;
    document.addEventListener('click', () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
    }, { once: true });

    const firebaseConfig = { apiKey: "AIzaSyAzMfCPalgaZx7chEghiI_-kpIzvLq61BU", authDomain: "toner-track-pro-v2.firebaseapp.com", projectId: "toner-track-pro-v2", storageBucket: "toner-track-pro-v2.firebasestorage.app", messagingSenderId: "96521492059", appId: "1:96521492059:web:c40e09b3a53294246a117e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DEFAULT_LINES = ['LINE 1', 'LINE 2', 'LINE 3'];
    let inventory = {}, history = [], lines = [...DEFAULT_LINES], suppliers = [], ordersList = [], aliases = {}, rowOrder = [], editingCell = null;
    let deviceMode = localStorage.getItem('tonerMode') || 'full';
    let currentLineFilter = '__ALL__';
    let fastScanMode = false;

    // FAST SCAN buffer: key = tonerCode, value = { historyDocId, quantity, timer }
    const scanBuffer = {};

    db.collection('inventory').onSnapshot(s => { const n = {}; s.forEach(d => n[d.id] = d.data()); inventory = n; if(!editingCell) refreshUI(); });
    db.collection('history').orderBy('timestamp','desc').onSnapshot(s => { history = []; s.forEach(d => history.push({id:d.id,...d.data()})); if(!editingCell) refreshUI(); });
    db.collection('orders').orderBy('createdAt','desc').onSnapshot(s => { ordersList = []; s.forEach(d => ordersList.push({id:d.id,...d.data()})); if(!editingCell) refreshUI(); });
    db.collection('settings').doc('config').onSnapshot(d => {
        if(d.exists){
            const data = d.data();
            if(data.lines) lines = data.lines;
            if(data.suppliers) suppliers = data.suppliers;
            if(data.aliases) aliases = data.aliases;
            if(data.rowOrder) rowOrder = data.rowOrder;
        } else {
            db.collection('settings').doc('config').set({lines:DEFAULT_LINES,suppliers:[],aliases:{},rowOrder:[]});
            lines=[...DEFAULT_LINES]; suppliers=[]; aliases={}; rowOrder=[];
        }
        if(!editingCell) refreshUI();
    });

    // ---------- Core render functions unchanged except where noted ----------
    function refreshUI() { renderLineTabs(); renderInventory(); renderOrders(); renderHistory(); renderLowStock(); drawBarChart(); drawSpendingChart(); updateStats(); updateMiniCards(); updateTonerSuggest(); updateSuggestions(); applyDeviceMode(); const anyLow = Object.values(inventory).some(t => t.stock < t.minLevel); document.getElementById('lowStockBanner').style.display = anyLow ? 'flex' : 'none'; }

    // Inline Edit Fix
    window.startInlineEdit = function(span) {
        if(editingCell) return;
        const field = span.getAttribute('data-field'), code = span.getAttribute('data-code');
        editingCell = { code, field };
        const current = span.textContent.replace('$','');
        const input = document.createElement('input');
        input.type = (field==='stock'||field==='min'||field==='cost') ? 'number' : 'text';
        input.value = field==='cost' ? current : span.textContent;
        input.step = field==='cost' ? '0.01' : '1';
        input.min = (field==='stock'||field==='min'||field==='cost') ? '0' : '';
        span.replaceWith(input);
        input.focus();
        input.addEventListener('blur', () => saveInlineEdit(input, code, field));
        input.addEventListener('keydown', (e) => { if(e.key==='Enter') input.blur(); });
    };

    async function saveInlineEdit(input, code, field) {
        const val = input.value.trim();
        const ref = db.collection('inventory').doc(code);
        try {
            const doc = await ref.get();
            if(!doc.exists) { editingCell = null; refreshUI(); return; }
            const updates = { lastUpdated: todayISO() };
            if (field === 'stock') updates.stock = parseInt(val) || 0;
            else if (field === 'min') updates.minLevel = parseInt(val) || 0;
            else if (field === 'cost') updates.cost = parseFloat(val) || 0;
            else if (field === 'barcode') updates.barcode = val.toUpperCase();
            else if (field === 'supplier') updates.supplier = val.toUpperCase();
            else if (field === 'code') {
                if (val && val !== code) {
                    const targetDoc = await db.collection('inventory').doc(val.toUpperCase()).get();
                    if (targetDoc.exists) { showToast('TONER NUMBER ALREADY EXISTS', 'error'); editingCell = null; refreshUI(); return; }
                    await ref.delete();
                    await db.collection('inventory').doc(val.toUpperCase()).set({...doc.data(), code: val.toUpperCase()});
                }
            } else if (field === 'color') updates.color = val;
            else if (field === 'line') updates.line = val;
            await ref.update(updates);
            showToast('Updated', 'success');
        } catch (err) {
            showToast('Update failed', 'error');
            console.error(err);
        } finally {
            editingCell = null;
            refreshUI();
        }
    }

    // Save row order with resilience
    async function saveRowOrder() {
        const newOrder = [];
        document.querySelectorAll('#inventoryBody tr[data-code]').forEach(r => {
            const code = r.getAttribute('data-code');
            if (code) newOrder.push(code);
        });
        if (newOrder.length === 0) return;
        try {
            await db.collection('settings').doc('config').update({ rowOrder: newOrder });
            rowOrder = newOrder;
            showToast('✅ Order saved!', 'success');
        } catch (err) {
            showToast('❌ Save failed', 'error');
            console.error(err);
            // Revert UI by re-rendering (since rowOrder not updated)
            refreshUI();
        }
    }

    // Updated receiveTonerDirect with cost tracking
    async function receiveTonerDirect(code, color, qty, supplier, notes, date, line, cost = 0) {
        const ref = db.collection('inventory').doc(code);
        const doc = await ref.get();
        const actualCost = cost || (doc.exists ? doc.data().cost || 0 : 0);
        if(!doc.exists) {
            await ref.set({
                code, color: color || 'N/A', stock: qty, minLevel: 3, lastUpdated: date,
                line, supplier, cost: actualCost, totalSpent: actualCost * qty
            });
        } else {
            const ex = doc.data();
            const newStock = (ex.stock || 0) + qty;
            const newTotalSpent = (ex.totalSpent || 0) + (actualCost * qty);
            await ref.update({
                stock: newStock,
                lastUpdated: date,
                line: line || ex.line,
                supplier: supplier || ex.supplier || '',
                totalSpent: newTotalSpent,
                cost: newStock > 0 ? newTotalSpent / newStock : 0
            });
        }
        await db.collection('history').add({
            date, type: 'in', tonerCode: code, quantity: qty,
            customerOrSupplier: supplier || 'N/A', line,
            costPerUnit: actualCost, timestamp: Date.now()
        });
    }

    // Updated order receipt functions
    window.receiveOrderItem = async (orderId, itemIndex) => {
        const ord = ordersList.find(o => o.id === orderId);
        if (!ord) return;
        const item = ord.items[itemIndex];
        const remaining = item.quantityOrdered - item.quantityReceived;
        const qty = parseInt(prompt(`RECEIVE HOW MANY OF ${item.tonerCode}? (REMAINING: ${remaining})`, remaining));
        if (!qty || qty <= 0 || qty > remaining) return;
        ord.items[itemIndex].quantityReceived += qty;
        const allReceived = ord.items.every(i => i.quantityReceived >= i.quantityOrdered);
        const cost = inventory[item.tonerCode]?.cost || 0;
        await receiveTonerDirect(item.tonerCode, item.color, qty, ord.supplier, `ORDER: ${ord.notes||orderId}`, todayISO(), item.line, cost);
        await db.collection('orders').doc(orderId).update({ items: ord.items, status: allReceived?'complete':'partial', updatedAt: Date.now() });
        showToast(`RECEIVED ${qty} OF ${item.tonerCode}`,'success');
        closeOrderDetail();
    };

    window.receiveAllOrder = async (orderId) => {
        if (!confirm('RECEIVE ALL REMAINING ITEMS IN THIS ORDER?')) return;
        const ord = ordersList.find(o => o.id === orderId);
        if (!ord) return;
        let allSucceeded = true;
        for (const item of ord.items) {
            const remaining = item.quantityOrdered - item.quantityReceived;
            if (remaining > 0) {
                try {
                    const cost = inventory[item.tonerCode]?.cost || 0;
                    await receiveTonerDirect(item.tonerCode, item.color, remaining, ord.supplier, `ORDER: ${ord.notes||orderId}`, todayISO(), item.line, cost);
                    item.quantityReceived = item.quantityOrdered;
                } catch (err) {
                    allSucceeded = false;
                    showToast(`FAILED TO RECEIVE ${item.tonerCode}`, 'error');
                }
            }
        }
        await db.collection('orders').doc(orderId).update({
            items: ord.items,
            status: allSucceeded ? 'complete' : 'partial',
            updatedAt: Date.now()
        });
        showToast(allSucceeded ? 'ORDER FULLY RECEIVED!' : 'ORDER PARTIALLY RECEIVED (some items failed)','success');
        closeOrderDetail();
    };

    // Improved handleReceive (calls receiveTonerDirect but can be left as is, but we'll ensure it uses cost)
    window.handleReceive = async (e) => {
        e.preventDefault();
        const line = document.getElementById('recLine').value;
        const code = document.getElementById('recTonerNumber').value.trim().toUpperCase() || document.getElementById('recCode').value.trim().toUpperCase();
        if(!line||!code){ showToast('TONER NUMBER AND LINE REQUIRED','error'); return; }
        const qty = parseInt(document.getElementById('recQty').value)||0;
        const cost = parseFloat(document.getElementById('recCost').value)||0;
        const supplier = document.getElementById('recSupplier').value.trim();
        const min = parseInt(document.getElementById('recMin').value)||3;
        const date = document.getElementById('recDate').value;
        const color = document.getElementById('recColor').value.trim();
        const barcode = document.getElementById('recCode').value.trim().toUpperCase();

        const ref = db.collection('inventory').doc(code);
        const doc = await ref.get();
        if(!doc.exists){
            await ref.set({code,color:color||'N/A',stock:qty,minLevel:min,lastUpdated:date,line,supplier,cost,totalSpent:cost*qty,barcode:barcode||code});
        } else {
            const ex = doc.data();
            const ns = (ex.stock||0)+qty, nts = (ex.totalSpent||0)+(cost*qty);
            await ref.update({stock:ns,color:color||ex.color,minLevel:min>=0?min:ex.minLevel,line,supplier:supplier||ex.supplier||'',cost:ns>0?nts/ns:0,totalSpent:nts,lastUpdated:date,barcode:barcode||ex.barcode||ex.code});
        }
        if (barcode && barcode !== code && !aliases[barcode]) {
            const newAliases = {...aliases, [barcode]: code};
            await db.collection('settings').doc('config').update({ aliases: newAliases });
        }
        await db.collection('history').add({date,type:'in',tonerCode:code,quantity:qty,customerOrSupplier:supplier||'N/A',line,costPerUnit:cost,timestamp:Date.now()});
        showToast(`${code} RECEIVED`,'success');
        document.getElementById('recCode').value=''; document.getElementById('recTonerNumber').value=''; document.getElementById('recQty').value='1'; document.getElementById('recCost').value=''; document.getElementById('recCode').focus();
    };

    // Outgoing with stock check
    window.handleOutgoing = async (e) => {
        e.preventDefault();
        const code = document.getElementById('outTonerNumber').value.trim().toUpperCase();
        if (!code) { showToast('TONER NUMBER MISSING','error'); return; }
        const qty = parseInt(document.getElementById('outQty').value) || 0;
        const toner = inventory[code];
        if (!toner) { showToast('TONER NOT FOUND','error'); return; }
        if (toner.stock < qty) { showToast(`ONLY ${toner.stock} AVAILABLE`,'error'); return; }
        await db.collection('inventory').doc(code).update({
            stock: toner.stock - qty,
            lastUpdated: document.getElementById('outDate').value
        });
        await db.collection('history').add({
            date: document.getElementById('outDate').value,
            type: 'out',
            tonerCode: code,
            quantity: qty,
            customerOrSupplier: document.getElementById('outCustomer').value.trim() || 'WALK-IN',
            line: toner.line,
            costPerUnit: toner.cost || 0,
            timestamp: Date.now()
        });
        showNotification('OUTGOING', `${qty} ${code} SHIPPED. ${toner.stock - qty} LEFT.`, 'out');
        showToast(`${code} SHIPPED`, 'success');
        document.getElementById('outCode').value = '';
        document.getElementById('outTonerNumber').value = '';
        document.getElementById('outQty').value = '1';
        document.getElementById('outCode').focus();
    };

    // FAST SCAN improved with buffer and merge
    document.addEventListener('keydown', async (e) => {
        if (!fastScanMode) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (!window._scanBuffer) window._scanBuffer = { chars: '', timer: null };
        clearTimeout(window._scanBuffer.timer);

        if (e.key === 'Enter') {
            const barcode = window._scanBuffer.chars.trim().toUpperCase();
            window._scanBuffer.chars = '';
            if (!barcode || barcode.length < 4) return;

            const resolved = resolveAlias(barcode);
            const toner = inventory[resolved];
            if (!toner) { showToast(barcode + ' NOT FOUND', 'error'); return; }
            if (toner.stock < 1) { showToast(toner.code + ' OUT OF STOCK', 'error'); return; }

            const now = Date.now();
            const bufferEntry = scanBuffer[resolved];

            if (bufferEntry && (now - bufferEntry.timestamp) < 5000) {
                // Merge: increment quantity and update existing history doc
                clearTimeout(bufferEntry.timer);
                bufferEntry.quantity += 1;
                bufferEntry.timestamp = now;
                await db.collection('history').doc(bufferEntry.historyDocId).update({
                    quantity: bufferEntry.quantity,
                    timestamp: now
                });
                // Decrement inventory by 1 more
                await db.collection('inventory').doc(resolved).update({
                    stock: firebase.firestore.FieldValue.increment(-1),
                    lastUpdated: todayISO()
                });
                showNotification('FAST SCAN', `${bufferEntry.quantity} ${resolved} SHIPPED.`, 'out');
                playAlertChime();
                // Reset timer
                bufferEntry.timer = setTimeout(() => delete scanBuffer[resolved], 5000);
            } else {
                // Create new history record and buffer entry
                const historyRef = await db.collection('history').add({
                    date: todayISO(),
                    type: 'out',
                    tonerCode: resolved,
                    quantity: 1,
                    customerOrSupplier: 'FAST SCAN',
                    line: toner.line || '',
                    costPerUnit: toner.cost || 0,
                    timestamp: now
                });
                await db.collection('inventory').doc(resolved).update({
                    stock: firebase.firestore.FieldValue.increment(-1),
                    lastUpdated: todayISO()
                });
                const timer = setTimeout(() => delete scanBuffer[resolved], 5000);
                scanBuffer[resolved] = {
                    historyDocId: historyRef.id,
                    quantity: 1,
                    timestamp: now,
                    timer
                };
                showNotification('FAST SCAN', `1 ${resolved} SHIPPED.`, 'out');
                playAlertChime();
            }
        } else if (e.key.length === 1) {
            window._scanBuffer.chars += e.key;
            window._scanBuffer.timer = setTimeout(() => { window._scanBuffer.chars = ''; }, 100);
        }
    });

    // History Edit feature
    window.editHistory = (historyId, oldQty, oldDate, oldCustomer, oldType, tonerCode) => {
        const row = document.getElementById(`history-row-${historyId}`);
        if (!row) return;
        row.innerHTML = `
            <td><input type="date" value="${oldDate}" id="edit-date-${historyId}"></td>
            <td>${oldType.toUpperCase()}</td>
            <td>${tonerCode}</td>
            <td></td>
            <td><input type="number" value="${oldQty}" id="edit-qty-${historyId}" min="1"></td>
            <td></td>
            <td><input type="text" value="${oldCustomer}" id="edit-cust-${historyId}"></td>
            <td>
                <button class="btn btn-sm btn-green" onclick="saveHistoryEdit('${historyId}', '${tonerCode}', '${oldType}', ${oldQty})">SAVE</button>
                <button class="btn btn-sm btn-outline" onclick="renderHistory()">CANCEL</button>
            </td>
        `;
    };

    window.saveHistoryEdit = async (historyId, tonerCode, type, oldQty) => {
        const newQty = parseInt(document.getElementById(`edit-qty-${historyId}`).value);
        const newDate = document.getElementById(`edit-date-${historyId}`).value;
        const newCustomer = document.getElementById(`edit-cust-${historyId}`).value.trim();
        if (!newQty || newQty < 1) { showToast('Invalid quantity', 'error'); return; }

        const diff = newQty - oldQty;
        const ref = db.collection('inventory').doc(tonerCode);
        const doc = await ref.get();
        if (!doc.exists) { showToast('Toner not found', 'error'); return; }
        const currentStock = doc.data().stock || 0;

        if (type === 'out') {
            // If increasing outgoing, need enough stock
            if (diff > 0 && currentStock < diff) {
                showToast(`Only ${currentStock} in stock`, 'error');
                return;
            }
            // Stock adjustment: if newQty > oldQty, decrease stock; else increase stock
            const newStock = currentStock - diff;
            if (newStock < 0) { showToast('Not enough stock', 'error'); return; }
            await ref.update({ stock: newStock, lastUpdated: todayISO() });
        } else if (type === 'in') {
            const newStock = currentStock + diff;
            await ref.update({ stock: newStock, lastUpdated: todayISO() });
        }
        await db.collection('history').doc(historyId).update({
            quantity: newQty,
            date: newDate,
            customerOrSupplier: newCustomer,
            timestamp: Date.now()
        });
        showToast('History updated', 'success');
        renderHistory();
    };

    // Updated history render with edit button
    function renderHistory() {
        const search = (document.getElementById('searchHistory')?.value||'').toUpperCase();
        const filterType = document.getElementById('filterType')?.value||'all';
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';
        let filtered = history;
        if (filterType !== 'all') filtered = filtered.filter(h => h.type === filterType);
        if (search) filtered = filtered.filter(h => h.tonerCode.toUpperCase().includes(search) || (h.customerOrSupplier||'').toUpperCase().includes(search) || (h.line||'').toUpperCase().includes(search));
        filtered.slice(0,100).forEach(h => {
            const tr = document.createElement('tr');
            tr.id = `history-row-${h.id}`;
            tr.innerHTML = `
                <td>${h.date}</td>
                <td style="font-weight:700;text-transform:uppercase;">${h.type}</td>
                <td>${(h.line||'').toUpperCase()}</td>
                <td style="font-weight:700;">${h.tonerCode}</td>
                <td>${h.quantity}</td>
                <td>$${(h.costPerUnit||0).toFixed(2)}</td>
                <td>${h.customerOrSupplier||''}</td>
                <td>
                    <button class="btn btn-sm btn-outline" onclick="editHistory('${h.id}', ${h.quantity}, '${h.date}', '${h.customerOrSupplier||''}', '${h.type}', '${h.tonerCode}')">EDIT</button>
                    <button class="btn btn-sm btn-danger" onclick="undoHistory('${h.id}')">UNDO</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Chart drawing with fallback
    function drawBarChart() {
        const canvas = document.getElementById('barChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const data = lines.map(line => ({line: line.toUpperCase(), stock: Object.values(inventory).filter(t=>(t.line||'').toUpperCase()===line.toUpperCase()).reduce((s,t)=>s+t.stock,0)}));
        if (data.length === 0) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
        const max = Math.max(...data.map(d=>d.stock),1);
        const w = canvas.parentElement.clientWidth-40;
        canvas.width=w; canvas.height=180;
        ctx.clearRect(0,0,w,180);
        const barWidth = (w-(data.length+1)*20)/data.length;
        data.forEach((d,i)=>{
            const x=20+i*(barWidth+20);
            const barH=(d.stock/max)*130;
            ctx.fillStyle = '#f68523';
            ctx.beginPath();
            ctx.roundRect(x,160-barH,barWidth,barH,6);
            ctx.fill();
            ctx.fillStyle='#fff'; ctx.font='bold 11px Inter'; ctx.textAlign='center';
            ctx.fillText(d.stock,x+barWidth/2,158-barH-4);
            ctx.fillStyle='#9ba5b0'; ctx.font='10px Inter';
            ctx.fillText(d.line,x+barWidth/2,173);
        });
    }

    function drawSpendingChart() {
        const canvas = document.getElementById('spendingChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const fourWeeksAgo = new Date(Date.now()-28*24*60*60*1000).toISOString().slice(0,10);
        const recentIn = history.filter(h=>h.type==='in' && h.date>=fourWeeksAgo);
        const spending = {};
        lines.forEach(l=>spending[l]=0);
        recentIn.forEach(h=>{ if(spending[h.line]!==undefined) spending[h.line] += (h.costPerUnit||0)*h.quantity; });
        const data = lines.map(line=>({line: line.toUpperCase(),spent:spending[line]||0}));
        if (data.length === 0) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
        const max = Math.max(...data.map(d=>d.spent),1);
        const w = canvas.parentElement.clientWidth-40;
        canvas.width=w; canvas.height=180;
        ctx.clearRect(0,0,w,180);
        const barWidth = (w-(data.length+1)*20)/data.length;
        data.forEach((d,i)=>{
            const x=20+i*(barWidth+20);
            const barH=(d.spent/max)*130;
            ctx.fillStyle = '#2d9cdb';
            ctx.beginPath();
            ctx.roundRect(x,160-barH,barWidth,barH,6);
            ctx.fill();
            ctx.fillStyle='#fff'; ctx.font='bold 11px Inter'; ctx.textAlign='center';
            ctx.fillText('$'+d.spent.toFixed(0),x+barWidth/2,158-barH-4);
            ctx.fillStyle='#9ba5b0'; ctx.font='10px Inter';
            ctx.fillText(d.line,x+barWidth/2,173);
        });
    }

    // Audio alert with resume check
    function playAlertChime() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            [660,880].forEach((f,i)=>{
                const o=audioCtx.createOscillator();
                const g=audioCtx.createGain();
                o.type='sine'; o.frequency.value=f;
                g.gain.value=0.15; o.connect(g); g.connect(audioCtx.destination);
                o.start(audioCtx.currentTime+i*0.15);
                o.stop(audioCtx.currentTime+i*0.15+0.15);
            });
        } catch(e) {}
    }
