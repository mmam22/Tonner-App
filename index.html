<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TonerTrack Test</title>
    <style>
        body { font-family: Inter, sans-serif; background: #0b1219; color: #e4e8ec; padding: 20px; }
        .line-tabs { display: flex; gap: 10px; margin: 20px 0; }
        .line-tab { padding: 10px 20px; border-radius: 30px; cursor: pointer; border: 1px solid #253341; background: #1a2835; color: #9ba5b0; }
        .line-tab.active { background: #f68523; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #253341; text-align: left; }
        th { background: #1a2835; }
    </style>
</head>
<body>
    <h1>TonerTrack Test</h1>
    <div class="line-tabs" id="lineTabs"></div>
    <table>
        <thead><tr><th>Line</th><th>Code</th><th>Color</th><th>Stock</th></tr></thead>
        <tbody id="inventoryBody"></tbody>
    </table>
    <p id="clickLog" style="margin-top:20px; color:#f68523;"></p>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzMfCPalgaZx7chEghiI_-kpIzvLq61BU",
            authDomain: "toner-track-pro-v2.firebaseapp.com",
            projectId: "toner-track-pro-v2",
            storageBucket: "toner-track-pro-v2.firebasestorage.app",
            messagingSenderId: "96521492059",
            appId: "1:96521492059:web:c40e09b3a53294246a117e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let inventory = {};
        let lines = ['Line 1', 'Line 2', 'Line 3'];
        let currentFilter = '__ALL__';

        db.collection('inventory').onSnapshot(snapshot => {
            const newInv = {};
            snapshot.forEach(doc => { newInv[doc.id] = doc.data(); });
            inventory = newInv;
            renderLineTabs();
            renderTable();
        });

        function renderLineTabs() {
            const container = document.getElementById('lineTabs');
            container.innerHTML = '';
            
            const allBtn = document.createElement('span');
            allBtn.className = 'line-tab' + (currentFilter === '__ALL__' ? ' active' : '');
            allBtn.textContent = 'All';
            allBtn.style.cursor = 'pointer';
            allBtn.onclick = function() {
                currentFilter = '__ALL__';
                document.getElementById('clickLog').textContent = 'Clicked: All';
                renderLineTabs();
                renderTable();
            };
            container.appendChild(allBtn);

            lines.forEach(function(line) {
                const btn = document.createElement('span');
                btn.className = 'line-tab' + (currentFilter === line ? ' active' : '');
                btn.textContent = line;
                btn.style.cursor = 'pointer';
                btn.onclick = function() {
                    currentFilter = line;
                    document.getElementById('clickLog').textContent = 'Clicked: ' + line;
                    renderLineTabs();
                    renderTable();
                };
                container.appendChild(btn);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            const filtered = Object.values(inventory).filter(t => 
                currentFilter === '__ALL__' || t.line === currentFilter
            );
            filtered.forEach(t => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.line||'?'}</td><td>${t.code}</td><td>${t.color}</td><td>${t.stock}</td>`;
                tbody.appendChild(tr);
            });
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No toners found</td></tr>';
            }
        }

        renderLineTabs();
        renderTable();
    </script>
</body>
</html>
